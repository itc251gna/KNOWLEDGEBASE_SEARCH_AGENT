server {
    listen 18443 ssl http2;
    server_name 10.4.51.232 linuxsrv01;

    ssl_certificate /etc/ssl/portal-search/portal-search.crt;
    ssl_certificate_key /etc/ssl/portal-search/portal-search.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    server_tokens off;
    client_max_body_size 64m;

    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "frame-ancestors 'self' http://251gna https://251gna http://10.4.51.232 https://10.4.51.232" always;
    add_header Referrer-Policy same-origin always;

    location / {
        proxy_pass http://127.0.0.1:18085;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
