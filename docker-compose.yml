services:
  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "LocalDevOnly1!"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"

  tika:
    build:
      context: ./docker/tika
    ports:
      - "9998:9998"

  app:
    build: .
    env_file:
      - .env
    depends_on:
      - opensearch
      - tika
    volumes:
      - ./data:/app/data
    ports:
      - "8080:8080"

  scheduler:
    build: .
    env_file:
      - .env
    depends_on:
      - opensearch
      - tika
    volumes:
      - ./data:/app/data
    command: ["python", "-m", "portal_search_agent.cli", "scheduler"]
    profiles:
      - scheduler

volumes:
  opensearch-data:
